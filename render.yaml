services:
  - type: web
    name: btc-trade-dashboard
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: DB_PATH
        value: /opt/render/project/src/trades.db
    disk:
      name: trades-data
      mountPath: /opt/render/project/src
      sizeGB: 1
