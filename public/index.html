<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Scalp Journal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0b0e14; --surface:#111520; --border:#1e2535; --border2:#252d40;
    --text:#cdd6f4; --muted:#585f7a; --win:#4ade80; --loss:#f87171;
    --neutral:#7c8db0; --accent:#7aa2f7; --long:#4ade80; --short:#f87171;
    --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
  }
  html,body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:12px; height:100%; overflow:hidden; }
  .app { display:flex; flex-direction:column; height:100vh; padding:8px; gap:6px; }

  /* HEADER */
  .header { display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:var(--surface); border:1px solid var(--border); border-radius:6px; flex-shrink:0; }
  .logo { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--accent); letter-spacing:0.08em; }
  .badge { font-family:var(--mono); font-size:10px; color:var(--muted); background:var(--border); padding:2px 6px; border-radius:3px; margin-left:8px; }
  .last-update { font-family:var(--mono); font-size:9px; color:var(--muted); }
  .pulse { width:6px; height:6px; border-radius:50%; background:var(--win); animation:pulse 2s infinite; margin-right:8px; flex-shrink:0; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.85)} }

  /* STATS */
  .stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; flex-shrink:0; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:5px; padding:6px 8px; }
  .stat-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
  .stat-value { font-family:var(--mono); font-size:13px; font-weight:700; color:var(--text); }
  .stat-value.win{color:var(--win)} .stat-value.loss{color:var(--loss)}

  /* QUICK EDIT BANNER — appears automatically on new trade */
  .quick-edit {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 10px 12px;
    flex-shrink: 0;
    display: none;
    flex-direction: column;
    gap: 8px;
    position: relative;
  }
  .quick-edit.visible { display: flex; }

  .qe-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .qe-new-badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    color: #0b0e14;
    background: var(--accent);
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: .06em;
    flex-shrink: 0;
  }

  .qe-trade-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    flex: 1;
  }

  .qe-dismiss {
    font-size: 10px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .qe-dismiss:hover { color: var(--text); }

  .qe-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .qe-section-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    flex-shrink: 0;
    width: 40px;
  }

  /* Direction buttons */
  .qe-dirs { display:flex; gap:5px; }
  .qe-dir {
    font-family:var(--mono); font-size:12px; font-weight:700;
    padding:5px 14px; border-radius:4px; cursor:pointer;
    border:1px solid var(--border2); background:var(--bg); color:var(--muted);
    transition:all .1s;
  }
  .qe-dir.long.active  { background:rgba(74,222,128,.15); border-color:var(--long);  color:var(--long); }
  .qe-dir.short.active { background:rgba(248,113,113,.15); border-color:var(--short); color:var(--short); }
  .qe-dir:hover:not(.active) { border-color:var(--text); color:var(--text); }

  /* Size buttons */
  .qe-sizes { display:flex; gap:4px; flex-wrap:wrap; }
  .qe-size {
    font-family:var(--mono); font-size:11px;
    padding:5px 9px; border-radius:3px; cursor:pointer;
    border:1px solid var(--border2); background:var(--bg); color:var(--muted);
    transition:all .1s;
  }
  .qe-size.active { background:var(--accent); border-color:var(--accent); color:#0b0e14; font-weight:700; }
  .qe-size:hover:not(.active) { border-color:var(--accent); color:var(--text); }

  /* Save button */
  .qe-save {
    font-family:var(--mono); font-size:12px; font-weight:700;
    padding:6px 20px; background:var(--win); color:#0b0e14;
    border:none; border-radius:4px; cursor:pointer; flex-shrink:0;
    transition:opacity .1s; margin-left:auto;
  }
  .qe-save:hover{opacity:.85} .qe-save:active{opacity:.7}

  /* TABLE */
  .table-wrap { flex:1; overflow:hidden; background:var(--surface); border:1px solid var(--border); border-radius:6px; display:flex; flex-direction:column; }
  table { width:100%; border-collapse:collapse; }
  thead th { font-family:var(--mono); font-size:9px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; padding:7px 8px; text-align:right; border-bottom:1px solid var(--border); background:var(--bg); white-space:nowrap; }
  thead th:first-child,thead th:nth-child(2),thead th:nth-child(3){text-align:left}
  tbody tr { border-bottom:1px solid var(--border); }
  tbody tr:last-child{border-bottom:none}
  tbody tr.row-long  { border-left:2px solid var(--long); }
  tbody tr.row-short { border-left:2px solid var(--short); }
  tbody tr.row-empty { border-left:2px solid transparent; }
  td { font-family:var(--mono); font-size:11px; padding:6px 8px; color:var(--neutral); text-align:right; white-space:nowrap; }
  td:first-child{text-align:left;width:22px} td:nth-child(2){text-align:left} td:nth-child(3){text-align:left}
  .dir-long{color:var(--long);font-weight:600} .dir-short{color:var(--short);font-weight:600}
  .pnl-win{color:var(--win);font-weight:700} .pnl-loss{color:var(--loss);font-weight:700}
  .pts-win{color:var(--win)} .pts-loss{color:var(--loss)}
  .row-num{color:var(--border2);font-size:9px} .time-cell{color:var(--muted);font-size:10px}
  @keyframes flash-in{0%{background:rgba(122,162,247,.2)}100%{background:transparent}}
  tr.new-trade{animation:flash-in 2s ease-out}

  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted)}
  .empty-state .icon{font-size:24px;opacity:.3}

  .footer{padding:4px 10px;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;flex-shrink:0}
  .clear-btn{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--muted);background:none;border:1px solid var(--border2);border-radius:3px;padding:2px 7px;cursor:pointer}
  .clear-btn:hover{color:var(--loss);border-color:var(--loss)}
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:center">
      <span class="pulse"></span>
      <span class="logo">SCALP JOURNAL</span>
      <span class="badge">BTC/USD · CFD</span>
    </div>
    <span class="last-update" id="lastUpdate">connecting…</span>
  </div>

  <!-- AUTO QUICK EDIT — slides in when new trade detected -->
  <div class="quick-edit" id="quickEdit">
    <div class="qe-top">
      <span class="qe-new-badge">NEW TRADE</span>
      <span class="qe-trade-info" id="qeInfo">—</span>
      <button class="qe-dismiss" onclick="dismissEdit()">✕ dismiss</button>
    </div>

    <div class="qe-row">
      <span class="qe-section-label">Dir</span>
      <div class="qe-dirs">
        <button class="qe-dir long"  id="qeLong"  onclick="setDir('Long')">LONG</button>
        <button class="qe-dir short" id="qeShort" onclick="setDir('Short')">SHORT</button>
      </div>
    </div>

    <div class="qe-row">
      <span class="qe-section-label">Size</span>
      <div class="qe-sizes" id="qeSizes"></div>
      <button class="qe-save" onclick="saveEdit()">✓ Done</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Net P&L</div><div class="stat-value" id="statNet">—</div></div>
    <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value" id="statWr">—</div></div>
    <div class="stat-card"><div class="stat-label">W / L</div><div class="stat-value" id="statWl">—</div></div>
    <div class="stat-card"><div class="stat-label">Best</div><div class="stat-value win" id="statBest">—</div></div>
    <div class="stat-card"><div class="stat-label">Worst</div><div class="stat-value loss" id="statWorst">—</div></div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table id="tradeTable" style="display:none">
      <thead>
        <tr><th>#</th><th>Dir</th><th>Time</th><th>Entry</th><th>Exit</th><th>Points</th><th>Size</th><th>P&L</th></tr>
      </thead>
      <tbody id="tradeBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState">
      <span class="icon">⬡</span>
      <p>Waiting for first trade via TradingView alert…</p>
    </div>
  </div>

  <div class="footer">
    <span style="font-family:var(--mono);font-size:9px;color:var(--muted)">Trade logs automatically → edit panel opens instantly</span>
    <button class="clear-btn" onclick="clearTrades()">Clear all</button>
  </div>

</div>
<script>
  const SIZES = [0.01,0.02,0.05,0.08,0.1,0.2,0.4,0.5,0.6,0.8,1];
  let lastIds    = new Set();
  let editId     = null;
  let editDir    = 'Long';
  let editSize   = null;
  let tradesCache = [];

  // Build size buttons once
  const sizesEl = document.getElementById('qeSizes');
  SIZES.forEach(s => {
    const b = document.createElement('button');
    b.className   = 'qe-size';
    b.textContent = s;
    b.onclick     = () => setSize(s);
    sizesEl.appendChild(b);
  });

  // ── QUICK EDIT CONTROLS ────────────────────────────────────────────────────
  function setDir(dir) {
    editDir = dir;
    document.getElementById('qeLong').classList.toggle('active',  dir==='Long');
    document.getElementById('qeShort').classList.toggle('active', dir==='Short');
  }

  function setSize(s) {
    editSize = s;
    document.querySelectorAll('.qe-size').forEach(b => {
      b.classList.toggle('active', parseFloat(b.textContent) === s);
    });
  }

  function dismissEdit() {
    editId = null;
    document.getElementById('quickEdit').classList.remove('visible');
  }

  async function saveEdit() {
    if (!editId) return;
    const body = {};
    if (editSize)  body.size      = editSize;
    if (editDir)   body.direction = editDir;

    await fetch(`/api/trade/${editId}`, {
      method:  'PATCH',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify(body)
    });

    dismissEdit();
    poll();
  }

  // Save on Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && editId) saveEdit();
    if (e.key === 'Escape') dismissEdit();
  });

  // ── AUTO-OPEN on new trade ─────────────────────────────────────────────────
  function checkForNewTrade(closed) {
    const newIds = new Set(closed.map(t => t.id));
    const brandNew = closed.find(t => !lastIds.has(t.id));

    if (brandNew && !editId) {
      editId   = brandNew.id;
      editSize = null;

      // Pre-select current direction
      setDir(brandNew.direction);

      // Pre-highlight current size if it matches a button
      document.querySelectorAll('.qe-size').forEach(b => b.classList.remove('active'));
      const match = SIZES.find(s => s === brandNew.size);
      if (match) setSize(match);

      // Show trade info
      document.getElementById('qeInfo').textContent =
        `${brandNew.direction} · ${fmt.price(brandNew.entry_price)} → ${fmt.price(brandNew.exit_price)} · ${fmt.pts(brandNew.points)} pts`;

      document.getElementById('quickEdit').classList.add('visible');
    }

    lastIds = newIds;
  }

  // ── FORMAT ─────────────────────────────────────────────────────────────────
  const fmt = {
    price: v => v==null?'—':Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),
    pts:   v => v==null?'—':(v>=0?'+':'')+Number(v).toFixed(2),
    pnl:   v => v==null?'—':(v>=0?'+$':'-$')+Math.abs(v).toFixed(2),
    time:  v => { if(!v) return '—'; return new Date(v).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); },
  };

  // ── RENDER ─────────────────────────────────────────────────────────────────
  function render({closed, stats}) {
    document.getElementById('lastUpdate').textContent = 'updated '+new Date().toLocaleTimeString('en-GB');
    tradesCache = closed;

    checkForNewTrade(closed);

    if (stats && stats.total > 0) {
      const wr = stats.wins/(stats.wins+stats.losses);
      const n  = document.getElementById('statNet');
      n.textContent = fmt.pnl(stats.net_pnl);
      n.className   = 'stat-value '+(stats.net_pnl>=0?'win':'loss');
      document.getElementById('statWr').textContent    = Math.round(wr*100)+'%';
      document.getElementById('statWl').textContent    = stats.wins+'W / '+stats.losses+'L';
      document.getElementById('statBest').textContent  = fmt.pnl(stats.best);
      document.getElementById('statWorst').textContent = fmt.pnl(stats.worst);
    }

    const tbody = document.getElementById('tradeBody');
    const empty = document.getElementById('emptyState');
    const table = document.getElementById('tradeTable');

    if (!closed.length) { table.style.display='none'; empty.style.display='flex'; return; }
    table.style.display=''; empty.style.display='none';

    const rows = [...closed];
    while (rows.length < 8) rows.push(null);
    tbody.innerHTML = '';

    rows.forEach((trade, i) => {
      const tr = document.createElement('tr');
      if (!trade) {
        tr.className = 'row-empty';
        tr.innerHTML = `<td class="row-num">${i+1}</td><td>—</td><td class="time-cell">—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>`;
      } else {
        const isNew    = editId === trade.id;
        tr.className   = 'row-'+trade.direction.toLowerCase()+(isNew?' new-trade':'');
        const ptsClass = trade.points>=0?'pts-win':'pts-loss';
        const pnlClass = trade.pnl>=0?'pnl-win':'pnl-loss';
        const dirClass = trade.direction==='Long'?'dir-long':'dir-short';
        tr.innerHTML = `
          <td class="row-num">${i+1}</td>
          <td class="${dirClass}">${trade.direction}</td>
          <td class="time-cell">${fmt.time(trade.entry_time)}</td>
          <td>${fmt.price(trade.entry_price)}</td>
          <td>${fmt.price(trade.exit_price)}</td>
          <td class="${ptsClass}">${fmt.pts(trade.points)}</td>
          <td>${trade.size}</td>
          <td class="${pnlClass}">${fmt.pnl(trade.pnl)}</td>`;
      }
      tbody.appendChild(tr);
    });
  }

  // ── POLL ───────────────────────────────────────────────────────────────────
  async function poll() {
    try {
      const r = await fetch('/api/trades');
      render(await r.json());
    } catch {}
  }

  async function clearTrades() {
    if (!confirm('Clear all trades?')) return;
    await fetch('/api/trades',{method:'DELETE'});
    dismissEdit();
    poll();
  }

  poll();
  setInterval(poll, 2000);
</script>
</body>
</html>
