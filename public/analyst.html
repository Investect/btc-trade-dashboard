<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santosh — Live BTC Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#070a0f;
  --surface:#0c1018;
  --surface2:#111620;
  --border:#1c2535;
  --border2:#243040;
  --amber:#f59e0b;
  --amber-dim:#92610a;
  --cyan:#06b6d4;
  --cyan-dim:#0e5a6e;
  --green:#10b981;
  --green-dim:#064e35;
  --red:#ef4444;
  --red-dim:#5a1010;
  --purple:#8b5cf6;
  --purple-dim:#3b2066;
  --white:#f1f5f9;
  --muted:#4a5568;
  --muted2:#2d3748;
  --mono:'IBM Plex Mono',monospace;
  --sans:'Inter',sans-serif;
}

body{background:var(--bg);color:var(--white);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
#topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  height:52px;
  display:flex;
  align-items:center;
  gap:0;
  flex-shrink:0;
  position:relative;
}

#brand{
  font-family:var(--mono);
  font-size:15px;
  font-weight:600;
  color:var(--amber);
  letter-spacing:3px;
  margin-right:32px;
  display:flex;
  align-items:center;
  gap:8px;
}

.bolt{color:var(--amber);font-size:18px}

.ticker-item{
  display:flex;
  flex-direction:column;
  padding:0 20px;
  border-right:1px solid var(--border);
  height:52px;
  justify-content:center;
}
.ticker-item:first-of-type{border-left:1px solid var(--border)}

.ticker-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono)}
.ticker-value{font-size:14px;font-weight:600;font-family:var(--mono);margin-top:1px}

#price-val{color:var(--amber)}
#bias-val{color:var(--green)}
#score-val{color:var(--cyan)}
#session-val{color:var(--white);font-size:11px}

.live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:livepulse 2s infinite;
  margin-left:auto;
}
@keyframes livepulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--green)}50%{opacity:.4;box-shadow:none}}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}

/* FEED */
#feed-col{
  flex:1;
  display:flex;
  flex-direction:column;
  border-right:1px solid var(--border);
  overflow:hidden;
}

#feed-header{
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}

.feed-title{font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:2px}
.feed-count{font-size:10px;font-family:var(--mono);color:var(--muted2);margin-left:auto}

#feed{
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
#feed::-webkit-scrollbar{width:3px}
#feed::-webkit-scrollbar-thumb{background:var(--border2)}

/* FEED CARDS */
.card{
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--surface);
  animation:cardin .25s ease;
  overflow:hidden;
  cursor:default;
  transition:border-color .15s;
}
.card:hover{border-color:var(--border2)}
@keyframes cardin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* Card sizes */
.card-xl{border-width:1px}
.card-sm{padding:8px 12px;display:flex;align-items:center;gap:10px}

/* Card accent strips */
.card-bull{border-left:3px solid var(--green)}
.card-bear{border-left:3px solid var(--red)}
.card-neutral{border-left:3px solid var(--muted2)}
.card-news{border-left:3px solid var(--purple)}
.card-warning{border-left:3px solid var(--amber)}
.card-signal{border-left:3px solid var(--cyan)}

/* Card header */
.card-head{
  padding:8px 12px 6px;
  display:flex;
  align-items:center;
  gap:8px;
  border-bottom:1px solid var(--border);
}

.card-headline{
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
  font-family:var(--mono);
}

.card-time{font-size:10px;color:var(--muted);font-family:var(--mono);margin-left:auto}
.card-price{font-size:11px;color:var(--amber);font-family:var(--mono);font-weight:600}

/* Tags */
.tag{
  font-size:9px;
  font-family:var(--mono);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:1px;
  padding:2px 7px;
  border-radius:3px;
}
.tag-bull{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.tag-bear{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.tag-sweep{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.3)}
.tag-choch{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.tag-news{background:rgba(139,92,246,.15);color:var(--purple);border:1px solid rgba(139,92,246,.3)}
.tag-signal{background:rgba(6,182,212,.2);color:var(--cyan);border:1px solid rgba(6,182,212,.4)}
.tag-debrief{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}

/* Card body */
.card-body{padding:10px 12px}
.card-text{font-size:13px;line-height:1.6;color:var(--white)}
.card-text-sm{font-size:12px;line-height:1.5;color:#cbd5e1}

/* Bullet list style */
.card-bullets{padding:8px 12px 10px;display:flex;flex-direction:column;gap:4px}
.bullet-item{font-size:12px;color:#94a3b8;display:flex;gap:8px;line-height:1.5}
.bullet-dot{color:var(--cyan);font-size:10px;margin-top:3px;flex-shrink:0}

/* Zone box */
.zone-box{
  margin:0 12px 10px;
  background:rgba(6,182,212,.05);
  border:1px solid rgba(6,182,212,.15);
  border-radius:4px;
  padding:8px 10px;
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}
.zone-stat{display:flex;flex-direction:column;gap:2px}
.zone-label{font-size:9px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px}
.zone-value{font-size:12px;font-family:var(--mono);font-weight:600;color:var(--cyan)}

/* GO LONG / GO SHORT cards */
.card-go-long{
  background:linear-gradient(135deg,rgba(16,185,129,.08) 0%,var(--surface) 60%);
  border:1px solid rgba(16,185,129,.3);
  border-left:4px solid var(--green);
}
.card-go-short{
  background:linear-gradient(135deg,rgba(239,68,68,.08) 0%,var(--surface) 60%);
  border:1px solid rgba(239,68,68,.3);
  border-left:4px solid var(--red);
}

/* Session banner */
.session-banner{
  padding:7px 12px;
  border-radius:4px;
  font-size:11px;
  font-family:var(--mono);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:1.5px;
  display:flex;
  align-items:center;
  gap:8px;
  border:1px solid;
}
.session-london{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2);color:var(--green)}
.session-ny{background:rgba(6,182,212,.08);border-color:rgba(6,182,212,.2);color:var(--cyan)}
.session-overlap{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2);color:var(--amber)}
.session-asia{background:rgba(74,85,104,.08);border-color:rgba(74,85,104,.2);color:var(--muted)}
.session-dead{background:rgba(74,85,104,.05);border-color:rgba(74,85,104,.15);color:var(--muted)}

/* News card */
.news-card-inner{padding:8px 12px 10px}
.news-source{font-size:9px;font-family:var(--mono);color:var(--purple);text-transform:uppercase;letter-spacing:1px}
.news-headline{font-size:12px;color:var(--white);line-height:1.5;margin-top:3px}
.news-time{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:4px}

/* Small snapshot card */
.snap-card{
  padding:8px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  border-radius:4px;
  border:1px solid var(--border);
  background:var(--surface);
  animation:cardin .2s ease;
}
.snap-icon{font-size:14px;flex-shrink:0}
.snap-text{font-size:12px;color:#94a3b8;line-height:1.4;font-family:var(--mono)}

/* CHAT PANEL */
#chat-col{
  width:380px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  background:var(--surface);
}

#chat-header{
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.chat-title{font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:2px}

#chat-msgs{
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
#chat-msgs::-webkit-scrollbar{width:3px}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--border2)}

.chat-intro{
  background:rgba(245,158,11,.05);
  border:1px solid rgba(245,158,11,.15);
  border-radius:6px;
  padding:12px;
  font-size:12px;
  color:#94a3b8;
  line-height:1.7;
  text-align:center;
}
.chat-intro strong{color:var(--amber)}

.msg{display:flex;flex-direction:column;gap:3px;animation:cardin .2s ease}
.msg.user{align-items:flex-end}
.msg.santosh{align-items:flex-start}
.msg-name{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:0 4px}
.msg-bubble{padding:9px 13px;border-radius:6px;font-size:13px;line-height:1.55;max-width:90%}
.msg.user .msg-bubble{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--amber)}
.msg.santosh .msg-bubble{background:var(--surface2);border:1px solid var(--border);color:var(--white)}

.typing{display:flex;gap:4px;padding:10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:fit-content}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:tbounce 1.2s infinite}
.t-dot:nth-child(2){animation-delay:.2s}
.t-dot:nth-child(3){animation-delay:.4s}
@keyframes tbounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

#chat-input-wrap{
  padding:10px 12px;
  border-top:1px solid var(--border);
  display:flex;
  gap:8px;
  flex-shrink:0;
  background:var(--surface);
}
#chat-input{
  flex:1;background:var(--bg);border:1px solid var(--border);border-radius:4px;
  color:var(--white);font-family:var(--mono);font-size:12px;padding:8px 11px;
  outline:none;resize:none;height:36px;line-height:1.4;transition:border-color .15s;
}
#chat-input:focus{border-color:var(--amber)}
#chat-input::placeholder{color:var(--muted)}
#send-btn{
  background:var(--amber);color:#000;border:none;border-radius:4px;
  padding:8px 14px;font-family:var(--mono);font-size:11px;font-weight:600;
  cursor:pointer;letter-spacing:1px;transition:opacity .15s;flex-shrink:0;
}
#send-btn:hover{opacity:.85}
#send-btn:disabled{opacity:.4;cursor:not-allowed}

/* LEVELS CARD */
.card-levels{border-left:3px solid var(--amber);background:linear-gradient(135deg,rgba(245,158,11,.06) 0%,var(--surface) 60%)}
.levels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 12px 10px}
.level-item{display:flex;flex-direction:column;gap:2px}
.level-lbl{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.level-val{font-size:12px;font-family:var(--mono);font-weight:600}
.lv-high{color:var(--green)}.lv-low{color:var(--red)}.lv-neutral{color:var(--amber)}
.near-alert{margin:0 12px 10px;padding:6px 10px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:3px;font-size:11px;font-family:var(--mono);color:var(--amber)}

/* NEWS TICKER at very bottom */
#news-ticker{
  height:28px;
  background:var(--surface2);
  border-top:1px solid var(--border);
  overflow:hidden;
  flex-shrink:0;
  display:flex;
  align-items:center;
}
.ticker-label-small{
  font-size:9px;font-family:var(--mono);font-weight:600;
  color:var(--amber);text-transform:uppercase;letter-spacing:1px;
  padding:0 12px;border-right:1px solid var(--border);height:100%;
  display:flex;align-items:center;flex-shrink:0;
}
#ticker-scroll{
  flex:1;overflow:hidden;white-space:nowrap;
  font-size:11px;font-family:var(--mono);color:#64748b;
}
#ticker-inner{display:inline-block;animation:tickerscroll 60s linear infinite}
@keyframes tickerscroll{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}

@media(max-width:700px){
  #chat-col{display:none}
  #feed-col{border:none}
}
</style>
</head>
<body>

<div id="topbar">
  <div id="brand"><span class="bolt">⚡</span>SANTOSH</div>
  <div class="ticker-item">
    <span class="ticker-label">BTC/USD</span>
    <span class="ticker-value" id="price-val">—</span>
  </div>
  <div class="ticker-item">
    <span class="ticker-label">Bias</span>
    <span class="ticker-value" id="bias-val">—</span>
  </div>
  <div class="ticker-item">
    <span class="ticker-label">Score</span>
    <span class="ticker-value" id="score-val">—/5</span>
  </div>
  <div class="ticker-item">
    <span class="ticker-label">Session</span>
    <span class="ticker-value" id="session-val">—</span>
  </div>
  <div class="ticker-item">
    <span class="ticker-label">Last Event</span>
    <span class="ticker-value" id="event-val" style="font-size:11px;color:var(--muted)">Waiting...</span>
  </div>
  <div class="live-dot" id="live-dot"></div>
</div>

<div id="main">
  <div id="feed-col">
    <div id="feed-header">
      <span class="feed-title">⚡ Live Feed</span>
      <span class="feed-count" id="feed-count">0 events</span>
    </div>
    <div id="feed"></div>
  </div>

  <div id="chat-col">
    <div id="chat-header">
      <span class="chat-title">💬 Ask Santosh</span>
    </div>
    <div id="chat-msgs">
      <div class="chat-intro">
        <strong>Santosh here.</strong><br>
        Watching the chart. Ask me about any setup, bias, entry levels, or what I'm seeing right now.
      </div>
    </div>
    <div id="chat-input-wrap">
      <textarea id="chat-input" placeholder="Ask Santosh..." rows="1"></textarea>
      <button id="send-btn">SEND</button>
    </div>
  </div>
</div>

<div id="news-ticker">
  <div class="ticker-label-small">LIVE</div>
  <div id="ticker-scroll"><span id="ticker-inner">Loading market intel...</span></div>
</div>

<script>
const SESSION_ID = 'session_' + Date.now();
let lastFeedTs = null;
let marketCtx = {};
let isWaiting = false;
let feedCount = 0;

// ── SESSION ──────────────────────────────────────────────────
function getSession() {
  const h = new Date().getUTCHours();
  const m = new Date().getUTCMinutes();
  const t = h + m/60;
  if (t>=13&&t<16) return {label:'LON/NY OVERLAP',cls:'session-overlap',icon:'🔥'};
  if (t>=7&&t<12)  return {label:'LONDON OPEN',cls:'session-london',icon:'🇬🇧'};
  if (t>=12&&t<13) return {label:'PRE-NY',cls:'session-ny',icon:'⚡'};
  if (t>=16&&t<21) return {label:'NEW YORK',cls:'session-ny',icon:'🗽'};
  if (t>=21&&t<23) return {label:'SESSION CLOSE',cls:'session-dead',icon:'📉'};
  return {label:'ASIAN / DEAD ZONE',cls:'session-asia',icon:'😴'};
}

function updateSessionDisplay() {
  const s = getSession();
  document.getElementById('session-val').textContent = s.label;
}
updateSessionDisplay();
setInterval(updateSessionDisplay, 60000);

// ── TIME FORMAT ───────────────────────────────────────────────
function fmtTime(iso) {
  try {
    return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch { return '--:--:--'; }
}

// ── EVENT TYPE HELPERS ────────────────────────────────────────
function getCardConfig(eventType, bias) {
  const map = {
    go_long:          {tag:'🚀 GO LONG',tagCls:'tag-signal',cardCls:'card-go-long card-xl',size:'xl'},
    go_short:         {tag:'🔻 GO SHORT',tagCls:'tag-signal',cardCls:'card-go-short card-xl',size:'xl'},
    bull_bos:         {tag:'BOS BULL',tagCls:'tag-bull',cardCls:'card card-bull',size:'md'},
    bear_bos:         {tag:'BOS BEAR',tagCls:'tag-bear',cardCls:'card card-bear',size:'md'},
    choch_bull:       {tag:'CHoCH ▲',tagCls:'tag-choch',cardCls:'card card-warning',size:'md'},
    choch_bear:       {tag:'CHoCH ▼',tagCls:'tag-choch',cardCls:'card card-warning',size:'md'},
    b_sweep:          {tag:'BUY SWEEP',tagCls:'tag-sweep',cardCls:'card card-bull',size:'md'},
    s_sweep:          {tag:'SELL SWEEP',tagCls:'tag-sweep',cardCls:'card card-bear',size:'md'},
    dashboard_update: {tag:'DASHBOARD',tagCls:'tag-news',cardCls:'card card-signal',size:'sm'},
    debrief:          {tag:'DEBRIEF',tagCls:'tag-debrief',cardCls:'card card-warning',size:'md'},
    periodic:         {tag:'MARKET CHECK',tagCls:'tag-news',cardCls:'card card-neutral',size:'sm'},
    levels_analysis:  {tag:'📊 KEY LEVELS',tagCls:'tag-choch',cardCls:'card card-levels',size:'levels'},
  };
  return map[eventType] || {tag:'UPDATE',tagCls:'tag-news',cardCls:'card card-neutral',size:'sm'};
}

// ── BUILD FEED CARD ───────────────────────────────────────────
function buildCard(entry) {
  const cfg = getCardConfig(entry.event_type, entry.bias);
  const time = fmtTime(entry.timestamp);
  const price = entry.price ? '$' + Number(entry.price).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) : '';

  if (cfg.size === 'levels') {
    const div = document.createElement('div');
    div.className = cfg.cardCls;
    div.dataset.ts = entry.timestamp;
    div.style.borderRadius = '6px';
    div.style.overflow = 'hidden';
    div.style.border = '1px solid rgba(245,158,11,.25)';

    const nearHtml = entry.nearLevels && entry.nearLevels.length
      ? `<div class="near-alert">⚠ Near key level: ${entry.nearLevels.join(' · ')}</div>` : '';

    const eqHtml = [
      ...(entry.equalHighs||[]).map(h=>`<div class="level-item"><span class="level-lbl">Equal High</span><span class="level-val lv-high">${h}</span></div>`),
      ...(entry.equalLows||[]).map(l=>`<div class="level-item"><span class="level-lbl">Equal Low</span><span class="level-val lv-low">${l}</span></div>`),
    ].join('');

    const rangeHtml = entry.isRanging
      ? `<div class="level-item"><span class="level-lbl">Range High</span><span class="level-val lv-high">${entry.rangeHigh}</span></div>
         <div class="level-item"><span class="level-lbl">Range Low</span><span class="level-val lv-low">${entry.rangeLow}</span></div>` : '';

    div.innerHTML = `
      <div class="card-head">
        <span class="tag ${cfg.tagCls}">${cfg.tag}</span>
        <span class="card-price">${price}</span>
        <span class="card-time">${time}</span>
      </div>
      <div class="card-body"><div class="card-text-sm">${entry.commentary}</div></div>
      <div class="levels-grid">
        <div class="level-item"><span class="level-lbl">72h High</span><span class="level-val lv-high">${entry.high72h||'—'}</span></div>
        <div class="level-item"><span class="level-lbl">72h Low</span><span class="level-val lv-low">${entry.low72h||'—'}</span></div>
        <div class="level-item"><span class="level-lbl">Week High</span><span class="level-val lv-neutral">${entry.weekHigh||'—'}</span></div>
        <div class="level-item"><span class="level-lbl">Week Low</span><span class="level-val lv-neutral">${entry.weekLow||'—'}</span></div>
        ${eqHtml}
        ${rangeHtml}
      </div>
      ${nearHtml}`;
    return div;
  }

  if (cfg.size === 'sm') {
    // Small snapshot card
    const div = document.createElement('div');
    div.className = 'snap-card';
    div.dataset.ts = entry.timestamp;
    div.innerHTML = `
      <span class="snap-icon">📡</span>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
          <span class="tag ${cfg.tagCls}">${cfg.tag}</span>
          <span style="font-size:10px;color:var(--muted);font-family:var(--mono)">${time}</span>
          ${price ? `<span style="font-size:11px;color:var(--amber);font-family:var(--mono);margin-left:auto">${price}</span>` : ''}
        </div>
        <div class="snap-text">${entry.commentary}</div>
      </div>`;
    return div;
  }

  if (cfg.size === 'xl') {
    // GO LONG / GO SHORT — large card
    const isLong = entry.event_type === 'go_long';
    const div = document.createElement('div');
    div.className = cfg.cardCls;
    div.dataset.ts = entry.timestamp;
    div.style.borderRadius = '6px';
    div.style.overflow = 'hidden';

    let zoneHtml = '';
    if (entry.zone_active && entry.zone_mid) {
      zoneHtml = `
        <div class="zone-box">
          <div class="zone-stat"><span class="zone-label">Entry (midline)</span><span class="zone-value">${entry.zone_mid}</span></div>
          <div class="zone-stat"><span class="zone-label">TP</span><span class="zone-value" style="color:var(--green)">${entry.tp_level||'—'}</span></div>
          <div class="zone-stat"><span class="zone-label">SL</span><span class="zone-value" style="color:var(--red)">${entry.sl_level||'—'}</span></div>
        </div>`;
    }

    div.innerHTML = `
      <div class="card-head">
        <span class="tag ${cfg.tagCls}" style="font-size:11px;padding:3px 10px">${cfg.tag}</span>
        <span class="card-price">${price}</span>
        <span class="card-time">${time}</span>
      </div>
      <div class="card-body">
        <div class="card-text">${entry.commentary}</div>
      </div>
      ${zoneHtml}`;
    return div;
  }

  // Medium card — BOS, CHoCH, sweeps, debrief
  const div = document.createElement('div');
  div.className = cfg.cardCls;
  div.dataset.ts = entry.timestamp;

  // Vary format — some get bullets if text has multiple sentences
  const sentences = entry.commentary.split(/(?<=[.!?])\s+/).filter(s => s.length > 10);
  let bodyHtml = '';

  if (entry.event_type === 'debrief' && sentences.length >= 2) {
    // Debrief gets bullet format
    bodyHtml = `<div class="card-bullets">${sentences.map(s=>`
      <div class="bullet-item"><span class="bullet-dot">▸</span><span>${s}</span></div>`).join('')}
    </div>`;
  } else {
    bodyHtml = `<div class="card-body"><div class="card-text-sm">${entry.commentary}</div></div>`;
  }

  div.innerHTML = `
    <div class="card-head">
      <span class="tag ${cfg.tagCls}">${cfg.tag}</span>
      <span class="card-price">${price}</span>
      <span class="card-time">${time}</span>
    </div>
    ${bodyHtml}`;
  return div;
}

// ── SESSION BANNER ────────────────────────────────────────────
let lastSessionLabel = '';
function maybeAddSessionBanner() {
  const s = getSession();
  if (s.label === lastSessionLabel) return;
  lastSessionLabel = s.label;
  const div = document.createElement('div');
  div.className = `session-banner ${s.cls}`;
  div.innerHTML = `<span>${s.icon}</span><span>${s.label}</span><span style="margin-left:auto;font-size:9px;opacity:.6">${new Date().toUTCString().slice(17,22)} UTC</span>`;
  prependToFeed(div);
}

function prependToFeed(el) {
  const feed = document.getElementById('feed');
  const placeholder = document.getElementById('feed-placeholder');
  if (placeholder) placeholder.remove();
  feed.insertBefore(el, feed.firstChild);
  feedCount++;
  document.getElementById('feed-count').textContent = feedCount + ' events';
  // Trim
  while (feed.children.length > 50) feed.removeChild(feed.lastChild);
}

// ── POLL FEED ─────────────────────────────────────────────────
async function pollFeed() {
  try {
    const res = await fetch('/analyst-feed');
    const data = await res.json();
    if (!data.feed || !data.feed.length) return;

    const latest = data.feed[0];

    // Update header
    if (latest.price) {
      marketCtx = latest;
      document.getElementById('price-val').textContent = '$' + Number(latest.price).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
      const biasEl = document.getElementById('bias-val');
      const bias = latest.bias?.toUpperCase() || '—';
      biasEl.textContent = bias;
      biasEl.style.color = latest.bias==='bull' ? 'var(--green)' : latest.bias==='bear' ? 'var(--red)' : 'var(--muted)';
      const score = latest.bias==='bull' ? latest.bull_score : latest.bear_score;
      document.getElementById('score-val').textContent = (score||'—') + '/5';
      document.getElementById('event-val').textContent = (latest.event_type||'').replace(/_/g,' ').toUpperCase();
      document.getElementById('live-dot').style.background = 'var(--green)';
    }

    if (latest.timestamp !== lastFeedTs) {
      lastFeedTs = latest.timestamp;
      maybeAddSessionBanner();
      const card = buildCard(latest);
      prependToFeed(card);
    }
  } catch(e) {
    document.getElementById('live-dot').style.background = 'var(--red)';
  }
}

// Add feed placeholder
document.getElementById('feed').innerHTML = `
  <div id="feed-placeholder" style="text-align:center;color:var(--muted);font-size:12px;font-family:var(--mono);margin-top:40px;line-height:2.2">
    WAITING FOR MARKET DATA<br>
    <span style="font-size:10px;color:var(--muted2)">Webhooks will appear here automatically</span>
  </div>`;

// ── NEWS TICKER ───────────────────────────────────────────────
async function updateTicker() {
  try {
    const res = await fetch('/api/intel');
    const data = await res.json();
    if (data.items && data.items.length) {
      const text = data.items.slice(0,8).map(i => `${i.source}: ${i.headline}`).join('   ·   ');
      document.getElementById('ticker-inner').textContent = text;
    }
  } catch(e) {}
}
updateTicker();
setInterval(updateTicker, 60000);

// ── CHAT ─────────────────────────────────────────────────────
function appendMsg(role, name, text) {
  const c = document.getElementById('chat-msgs');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `<span class="msg-name">${name}</span><div class="msg-bubble">${text}</div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const msg = inp.value.trim();
  if (!msg || isWaiting) return;
  inp.value = '';
  isWaiting = true;
  document.getElementById('send-btn').disabled = true;
  appendMsg('user','You', msg);

  const typingEl = document.createElement('div');
  typingEl.className = 'msg santosh';
  typingEl.id = 'typing-indicator';
  typingEl.innerHTML = `<span class="msg-name">Santosh</span><div class="typing"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  document.getElementById('chat-msgs').appendChild(typingEl);
  document.getElementById('chat-msgs').scrollTop = 99999;

  try {
    const res = await fetch('/analyst-chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: msg, sessionId: SESSION_ID, marketContext: marketCtx })
    });
    const data = await res.json();
    typingEl.remove();
    appendMsg('santosh','Santosh', data.reply || 'Something went wrong.');
  } catch(e) {
    typingEl.remove();
    appendMsg('santosh','Santosh','Lost connection — check the server.');
  }

  isWaiting = false;
  document.getElementById('send-btn').disabled = false;
  inp.focus();
}

document.getElementById('send-btn').addEventListener('click', sendMsg);
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// ── START ─────────────────────────────────────────────────────
pollFeed();
setInterval(pollFeed, 3000);
</script>
