<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santosh — Live BTC Feed</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050709;
  --surface:#0a0d12;
  --surface2:#0f1318;
  --border:#161c26;
  --border2:#1e2738;
  --amber:#f59e0b;
  --amber2:#fbbf24;
  --cyan:#22d3ee;
  --green:#34d399;
  --red:#f87171;
  --purple:#a78bfa;
  --blue:#60a5fa;
  --white:#f8fafc;
  --grey:#94a3b8;
  --dim:#4a5568;
  --mono:'IBM Plex Mono',monospace;
  --sans:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--white);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOP BAR ── */
#topbar{
  background:rgba(5,7,9,.95);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  height:48px;
  display:flex;align-items:center;gap:0;
  flex-shrink:0;
  backdrop-filter:blur(10px);
}
#brand{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--amber);letter-spacing:3px;margin-right:24px;display:flex;align-items:center;gap:6px}
.tb-stat{display:flex;flex-direction:column;padding:0 16px;border-right:1px solid var(--border);height:48px;justify-content:center}
.tb-stat:first-of-type{border-left:1px solid var(--border)}
.tb-lbl{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono)}
.tb-val{font-size:13px;font-weight:600;font-family:var(--mono);margin-top:1px}
#price-v{color:var(--amber2)}
#bias-v{color:var(--green)}
#session-v{font-size:10px;color:var(--white)}
.live-pip{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pip 2s infinite;margin-left:auto}
@keyframes pip{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LAYOUT ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── LEFT: FEED ── */
#feed-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
#feed-tabs{
  display:flex;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
}
.tab{
  padding:10px 20px;font-size:12px;font-weight:600;color:var(--dim);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;
  text-transform:uppercase;letter-spacing:.5px;
}
.tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.tab:hover{color:var(--white)}

#feed{flex:1;overflow-y:auto;padding:0}
#feed::-webkit-scrollbar{width:3px}
#feed::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── TWEET-STYLE CARDS ── */
.tweet{
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  display:flex;gap:12px;
  transition:background .1s;
  animation:tweentin .2s ease;
}
.tweet:hover{background:rgba(255,255,255,.02)}
@keyframes tweentin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.tweet-avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;margin-top:1px;
}
.av-santosh{background:linear-gradient(135deg,#1a0a00,#3d1f00);border:1px solid var(--amber)}
.av-news{background:linear-gradient(135deg,#0a001a,#1f003d);border:1px solid var(--purple)}
.av-whale{background:linear-gradient(135deg,#001a1a,#003d3d);border:1px solid var(--cyan)}
.av-system{background:linear-gradient(135deg,#001a0a,#003d1f);border:1px solid var(--green)}
.av-levels{background:linear-gradient(135deg,#1a1000,#3d2800);border:1px solid var(--amber2)}

.tweet-body{flex:1;min-width:0}
.tweet-header{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.tweet-name{font-size:13px;font-weight:700;color:var(--white)}
.tweet-handle{font-size:12px;color:var(--dim)}
.tweet-time{font-size:11px;color:var(--dim);margin-left:auto;font-family:var(--mono)}
.tweet-price{font-size:11px;font-family:var(--mono);color:var(--amber);font-weight:600}

.tweet-text{font-size:13px;line-height:1.55;color:#e2e8f0}
.tweet-text.mono{font-family:var(--mono);font-size:12px;color:#94a3b8}

/* Signal tags inside tweets */
.sig-tag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-family:var(--mono);font-weight:600;
  padding:2px 8px;border-radius:12px;
  text-transform:uppercase;letter-spacing:.5px;
}
.st-bull{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.st-bear{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.st-amber{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.st-cyan{background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.25)}
.st-purple{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.st-green{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}

/* GO LONG / SHORT — hero cards */
.tweet-go-long{background:linear-gradient(135deg,rgba(52,211,153,.06) 0%,transparent 70%);border-left:3px solid var(--green)}
.tweet-go-short{background:linear-gradient(135deg,rgba(248,113,113,.06) 0%,transparent 70%);border-left:3px solid var(--red)}

/* Zone box inside tweet */
.zone-row{
  display:flex;gap:0;margin-top:8px;
  background:var(--surface2);border:1px solid var(--border2);border-radius:6px;overflow:hidden;
}
.zone-cell{flex:1;padding:6px 10px;border-right:1px solid var(--border2)}
.zone-cell:last-child{border-right:none}
.zc-lbl{font-size:8px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.zc-val{font-size:12px;font-family:var(--mono);font-weight:700;margin-top:2px}
.zc-entry{color:var(--cyan)}
.zc-tp{color:var(--green)}
.zc-sl{color:var(--red)}

/* Levels grid */
.levels-row{
  display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;
}
.lev-chip{
  padding:3px 8px;border-radius:4px;
  font-size:10px;font-family:var(--mono);font-weight:600;
}
.lc-high{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.lc-low{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.lc-neutral{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.lc-warn{background:rgba(34,211,238,.1);color:var(--cyan);border:1px solid rgba(34,211,238,.2)}

/* Trade status bar */
.trade-bar{
  margin-top:8px;padding:7px 10px;
  border-radius:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.tb-profit{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2)}
.tb-loss{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2)}
.tb-label{font-size:10px;font-family:var(--mono);color:var(--dim);text-transform:uppercase}
.tb-value{font-size:13px;font-family:var(--mono);font-weight:700}

/* Session banner tweet */
.session-tweet{
  padding:8px 16px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.session-pill{
  font-size:10px;font-family:var(--mono);font-weight:600;
  padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:1px;
}
.sp-overlap{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.sp-london{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.sp-ny{background:rgba(34,211,238,.1);color:var(--cyan);border:1px solid rgba(34,211,238,.2)}
.sp-asia{background:rgba(74,85,104,.1);color:var(--dim);border:1px solid rgba(74,85,104,.2)}
.sp-dead{background:rgba(74,85,104,.08);color:var(--dim);border:1px solid rgba(74,85,104,.15)}
.session-desc{font-size:11px;color:var(--dim)}

/* ── RIGHT: CHAT ── */
#chat-col{
  width:360px;flex-shrink:0;
  display:flex;flex-direction:column;
  border-left:1px solid var(--border);
  background:var(--surface);
}
#chat-header{
  padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.chat-title{font-size:11px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:2px}
#chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
#chat-msgs::-webkit-scrollbar{width:3px}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--border2)}

.chat-intro{
  background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);
  border-radius:8px;padding:12px;font-size:12px;color:var(--grey);
  line-height:1.7;text-align:center;
}
.chat-intro strong{color:var(--amber)}

.msg{display:flex;flex-direction:column;gap:3px;animation:tweentin .2s ease}
.msg.user{align-items:flex-end}
.msg.santosh{align-items:flex-start}
.msg-name{font-size:9px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:1px;padding:0 4px}
.msg-bubble{padding:9px 12px;border-radius:8px;font-size:13px;line-height:1.55;max-width:88%}
.msg.user .msg-bubble{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--amber2)}
.msg.santosh .msg-bubble{background:var(--surface2);border:1px solid var(--border);color:var(--white)}

.typing{display:flex;gap:4px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:fit-content}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:tb 1.2s infinite}
.t-dot:nth-child(2){animation-delay:.2s}.t-dot:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}

#chat-input-wrap{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
#chat-input{
  flex:1;background:var(--bg);border:1px solid var(--border);border-radius:20px;
  color:var(--white);font-family:var(--sans);font-size:13px;padding:8px 14px;
  outline:none;resize:none;height:38px;line-height:1.4;transition:border-color .15s;
}
#chat-input:focus{border-color:rgba(245,158,11,.4)}
#chat-input::placeholder{color:var(--dim)}
#send-btn{
  background:var(--amber);color:#000;border:none;border-radius:20px;
  padding:8px 16px;font-family:var(--sans);font-size:12px;font-weight:700;
  cursor:pointer;transition:opacity .15s;flex-shrink:0;
}
#send-btn:hover{opacity:.85}
#send-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── BOTTOM TICKER ── */
#ticker-bar{
  height:26px;background:var(--surface2);border-top:1px solid var(--border);
  display:flex;align-items:center;overflow:hidden;flex-shrink:0;
}
.ticker-badge{
  font-size:8px;font-family:var(--mono);font-weight:700;color:var(--amber);
  text-transform:uppercase;letter-spacing:1.5px;padding:0 12px;
  border-right:1px solid var(--border);height:100%;display:flex;align-items:center;flex-shrink:0;
}
#ticker-scroll{flex:1;overflow:hidden;white-space:nowrap}
#ticker-inner{display:inline-block;animation:scroll 80s linear infinite;font-size:11px;font-family:var(--mono);color:var(--dim)}
@keyframes scroll{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}

@media(max-width:768px){#chat-col{display:none}}
</style>
</head>
<body>

<div id="topbar">
  <div id="brand">⚡ SANTOSH</div>
  <div class="tb-stat">
    <span class="tb-lbl">BTC/USD</span>
    <span class="tb-val" id="price-v">—</span>
  </div>
  <div class="tb-stat">
    <span class="tb-lbl">Bias</span>
    <span class="tb-val" id="bias-v">—</span>
  </div>
  <div class="tb-stat">
    <span class="tb-lbl">Score</span>
    <span class="tb-val" id="score-v" style="color:var(--cyan)">—</span>
  </div>
  <div class="tb-stat">
    <span class="tb-lbl">Session</span>
    <span class="tb-val" id="session-v">—</span>
  </div>
  <div class="tb-stat">
    <span class="tb-lbl">Last Signal</span>
    <span class="tb-val" id="event-v" style="font-size:10px;color:var(--dim)">Waiting...</span>
  </div>
  <div class="live-pip" id="live-pip"></div>
</div>

<div id="main">
  <div id="feed-col">
    <div id="feed-tabs">
      <div class="tab active" onclick="switchTab('all',this)">All</div>
      <div class="tab" onclick="switchTab('signals',this)">Signals</div>
      <div class="tab" onclick="switchTab('news',this)">News</div>
      <div class="tab" onclick="switchTab('levels',this)">Levels</div>
    </div>
    <div id="feed"></div>
  </div>

  <div id="chat-col">
    <div id="chat-header">
      <span style="font-size:14px">⚡</span>
      <span class="chat-title">Ask Santosh</span>
    </div>
    <div id="chat-msgs">
      <div class="chat-intro">
        <strong>Santosh here.</strong><br>
        Ask me about any setup, live trade, key levels, or what I'm seeing right now.
      </div>
    </div>
    <div id="chat-input-wrap">
      <textarea id="chat-input" placeholder="Ask Santosh anything..." rows="1"></textarea>
      <button id="send-btn">↑</button>
    </div>
  </div>
</div>

<div id="ticker-bar">
  <div class="ticker-badge">Live</div>
  <div id="ticker-scroll"><span id="ticker-inner">Loading market intel...</span></div>
</div>

<script>
const SESSION_ID = 'sess_' + Date.now();
let lastFeedTs = null;
let marketCtx = {};
let isWaiting = false;
let activeTab = 'all';
let allEvents = [];
let lastSession = '';

// ── SESSION ──────────────────────────────────────────────────
function getSession() {
  const t = new Date().getUTCHours() + new Date().getUTCMinutes()/60;
  if (t>=13&&t<16) return {label:'LON/NY OVERLAP',desc:'Highest volume — best setups',cls:'sp-overlap',icon:'🔥'};
  if (t>=7&&t<12)  return {label:'LONDON',desc:'Strong directional moves expected',cls:'sp-london',icon:'🇬🇧'};
  if (t>=12&&t<13) return {label:'PRE-NY OPEN',desc:'Volatility building, news risk',cls:'sp-ny',icon:'⚡'};
  if (t>=16&&t<21) return {label:'NEW YORK',desc:'Good liquidity, watch for reversals',cls:'sp-ny',icon:'🗽'};
  if (t>=21&&t<23) return {label:'SESSION CLOSE',desc:'Volume dying — avoid new entries',cls:'sp-dead',icon:'📉'};
  return {label:'ASIAN DEAD ZONE',desc:'Low volume, choppy — no trading',cls:'sp-asia',icon:'😴'};
}

function updateHeader() {
  const s = getSession();
  document.getElementById('session-v').textContent = s.label;
  // Inject session banner if changed
  if (s.label !== lastSession) {
    lastSession = s.label;
    injectSessionBanner(s);
  }
}
updateHeader();
setInterval(updateHeader, 60000);

function injectSessionBanner(s) {
  const div = document.createElement('div');
  div.className = 'session-tweet';
  div.dataset.cat = 'system';
  div.innerHTML = `
    <span class="session-pill ${s.cls}">${s.icon} ${s.label}</span>
    <span class="session-desc">${s.desc}</span>
    <span style="font-size:10px;color:var(--dim);font-family:var(--mono);margin-left:auto">${new Date().toUTCString().slice(17,22)} UTC</span>`;
  prependFeed(div, 'system');
}

// ── TIME ─────────────────────────────────────────────────────
function fmtTime(iso) {
  try { return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
  catch { return '--:--'; }
}
function timeAgo(iso) {
  const diff = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
  if (diff < 10) return 'just now';
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return `${Math.floor(diff/3600)}h ago`;
}

// ── SIGNAL CONFIG ─────────────────────────────────────────────
function getSigConfig(evt, bias) {
  const m = {
    go_long:          {tag:'🚀 GO LONG',    tagCls:'st-green',  name:'Santosh',    handle:'@santosh_btc', av:'av-santosh', cat:'signals', cardCls:'tweet-go-long'},
    go_short:         {tag:'🔻 GO SHORT',   tagCls:'st-bear',   name:'Santosh',    handle:'@santosh_btc', av:'av-santosh', cat:'signals', cardCls:'tweet-go-short'},
    bull_bos:         {tag:'BOS BULL',      tagCls:'st-bull',   name:'Santosh',    handle:'@santosh_btc', av:'av-santosh', cat:'signals', cardCls:''},
    bear_bos:         {tag:'BOS BEAR',      tagCls:'st-bear',   name:'Santosh',    handle:'@santosh_btc', av:'av-santosh', cat:'signals', cardCls:''},
    choch_bull:       {tag:'CHoCH ▲',       tagCls:'st-amber',  name:'Santosh',    handle:'@santosh_btc', av:'av-santosh', cat:'signals', cardCls:''},
    choch_bear:       {tag:'CHoCH ▼',       tagCls:'st-amber',  name:'Santosh',    handle:'@santosh_btc', av:'av-santosh', cat:'signals', cardCls:''},
    b_sweep:          {tag:'BUY SWEEP',     tagCls:'st-cyan',   name:'Santosh',    handle:'@santosh_btc', av:'av-santosh', cat:'signals', cardCls:''},
    s_sweep:          {tag:'SELL SWEEP',    tagCls:'st-cyan',   name:'Santosh',    handle:'@santosh_btc', av:'av-santosh', cat:'signals', cardCls:''},
    periodic:         {tag:'MARKET',        tagCls:'st-amber',  name:'Santosh',    handle:'@santosh_btc', av:'av-santosh', cat:'signals', cardCls:''},
    dashboard_update: {tag:'INTEL',         tagCls:'st-purple', name:'Santosh',    handle:'@santosh_btc', av:'av-santosh', cat:'signals', cardCls:''},
    levels_analysis:  {tag:'📊 LEVELS',     tagCls:'st-amber',  name:'Santosh',    handle:'@santosh_btc', av:'av-levels',  cat:'levels',  cardCls:''},
    debrief:          {tag:'DEBRIEF',       tagCls:'st-amber',  name:'Santosh',    handle:'@santosh_btc', av:'av-santosh', cat:'signals', cardCls:''},
    news:             {tag:'NEWS',          tagCls:'st-purple', name:'Crypto Wire',handle:'@cryptowire',  av:'av-news',    cat:'news',    cardCls:''},
    whale:            {tag:'🐋 WHALE',      tagCls:'st-cyan',   name:'Whale Alert',handle:'@whalealert',  av:'av-whale',   cat:'news',    cardCls:''},
  };
  return m[evt] || {tag:'UPDATE', tagCls:'st-amber', name:'Santosh', handle:'@santosh_btc', av:'av-santosh', cat:'signals', cardCls:''};
}

// ── BUILD TWEET ───────────────────────────────────────────────
function buildTweet(entry) {
  const cfg = getSigConfig(entry.event_type, entry.bias);
  const time = fmtTime(entry.timestamp);
  const price = entry.price ? '$' + Number(entry.price).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) : '';

  const div = document.createElement('div');
  div.className = `tweet ${cfg.cardCls}`;
  div.dataset.ts = entry.timestamp;
  div.dataset.cat = cfg.cat;

  // Zone box for GO signals
  let zoneHtml = '';
  if ((entry.event_type==='go_long'||entry.event_type==='go_short') && entry.zone_mid) {
    zoneHtml = `
      <div class="zone-row">
        <div class="zone-cell"><div class="zc-lbl">Entry</div><div class="zc-val zc-entry">${entry.zone_mid}</div></div>
        <div class="zone-cell"><div class="zc-lbl">Take Profit</div><div class="zc-val zc-tp">${entry.tp_level||'—'}</div></div>
        <div class="zone-cell"><div class="zc-lbl">Stop Loss</div><div class="zc-val zc-sl">${entry.sl_level||'—'}</div></div>
      </div>`;
  }

  // Levels chips
  let levelsHtml = '';
  if (entry.event_type==='levels_analysis') {
    const chips = [];
    if (entry.high72h) chips.push(`<span class="lev-chip lc-high">72h H: ${entry.high72h}</span>`);
    if (entry.low72h)  chips.push(`<span class="lev-chip lc-low">72h L: ${entry.low72h}</span>`);
    if (entry.weekHigh) chips.push(`<span class="lev-chip lc-neutral">WK H: ${entry.weekHigh}</span>`);
    if (entry.weekLow)  chips.push(`<span class="lev-chip lc-neutral">WK L: ${entry.weekLow}</span>`);
    if (entry.equalHighs?.length) entry.equalHighs.forEach(h => chips.push(`<span class="lev-chip lc-warn">EQ H: ${h}</span>`));
    if (entry.equalLows?.length)  entry.equalLows.forEach(l  => chips.push(`<span class="lev-chip lc-warn">EQ L: ${l}</span>`));
    if (chips.length) levelsHtml = `<div class="levels-row">${chips.join('')}</div>`;
  }

  // Trade status bar
  let tradeHtml = '';
  if (entry.openTrade) {
    const t = entry.openTrade;
    const cls = t.inProfit ? 'tb-profit' : 'tb-loss';
    const col = t.inProfit ? 'var(--green)' : 'var(--red)';
    tradeHtml = `
      <div class="trade-bar ${cls}">
        <span class="tb-label">Live trade</span>
        <span class="tb-value" style="color:${col}">${t.direction} from $${t.entry} · ${t.inProfit?'+':''}${t.points}pts · ${t.inProfit?'+':''}$${t.pnl}</span>
        <span style="font-size:10px;color:var(--dim);font-family:var(--mono);margin-left:auto">${t.duration}</span>
      </div>`;
  }

  div.innerHTML = `
    <div class="tweet-avatar ${cfg.av}">${cfg.av==='av-santosh'?'⚡':cfg.av==='av-news'?'📰':cfg.av==='av-whale'?'🐋':'📊'}</div>
    <div class="tweet-body">
      <div class="tweet-header">
        <span class="tweet-name">${cfg.name}</span>
        <span class="tweet-handle">${cfg.handle}</span>
        <span class="sig-tag ${cfg.tagCls}">${cfg.tag}</span>
        ${price ? `<span class="tweet-price">${price}</span>` : ''}
        <span class="tweet-time">${time}</span>
      </div>
      <div class="tweet-text">${entry.commentary}</div>
      ${zoneHtml}${levelsHtml}${tradeHtml}
    </div>`;

  return div;
}

// ── NEWS TWEET ────────────────────────────────────────────────
function buildNewsTweet(item) {
  const cfg = getSigConfig(item.source?.toLowerCase().includes('whale') ? 'whale' : 'news');
  const div = document.createElement('div');
  div.className = 'tweet';
  div.dataset.cat = 'news';
  div.dataset.ts = item.pubDate || new Date().toISOString();

  const scoreColor = item.score >= 4 ? 'var(--red)' : item.score >= 3 ? 'var(--amber)' : 'var(--dim)';

  div.innerHTML = `
    <div class="tweet-avatar ${cfg.av}">${cfg.av==='av-whale'?'🐋':'📰'}</div>
    <div class="tweet-body">
      <div class="tweet-header">
        <span class="tweet-name">${item.source||'Crypto Wire'}</span>
        <span class="sig-tag ${cfg.tagCls}">${item.source?.toLowerCase().includes('whale')?'🐋 WHALE':'NEWS'}</span>
        ${item.score >= 3 ? `<span style="font-size:10px;color:${scoreColor};font-family:var(--mono)">Impact ${item.score}/5</span>` : ''}
        <span class="tweet-time">${timeAgo(item.pubDate)}</span>
      </div>
      <div class="tweet-text">${item.headline}</div>
      ${item.bullets && item.bullets[0] ? `<div class="tweet-text mono" style="margin-top:5px">${item.bullets[0]}</div>` : ''}
    </div>`;
  return div;
}

// ── FEED MANAGEMENT ──────────────────────────────────────────
function prependFeed(el, cat) {
  const feed = document.getElementById('feed');
  const ph = document.getElementById('feed-ph');
  if (ph) ph.remove();

  // Store for tab filtering
  allEvents.unshift({ el, cat, ts: Date.now() });
  if (allEvents.length > 60) allEvents.pop();

  if (activeTab === 'all' || activeTab === cat) {
    feed.insertBefore(el, feed.firstChild);
    while (feed.children.length > 50) feed.removeChild(feed.lastChild);
  }
}

function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  const feed = document.getElementById('feed');
  feed.innerHTML = '';

  const filtered = allEvents.filter(e => tab === 'all' || e.cat === tab);
  filtered.slice(0, 30).forEach(e => feed.appendChild(e.el));

  if (!filtered.length) {
    feed.innerHTML = `<div style="text-align:center;color:var(--dim);font-size:12px;font-family:var(--mono);padding:40px">No ${tab} events yet</div>`;
  }
}

// ── POLL FEED ─────────────────────────────────────────────────
async function pollFeed() {
  try {
    const res = await fetch('/analyst-feed');
    const data = await res.json();
    if (!data.feed?.length) return;

    const latest = data.feed[0];

    // Update header stats
    if (latest.price) {
      marketCtx = latest;
      document.getElementById('price-v').textContent = '$' + Number(latest.price).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
      const bEl = document.getElementById('bias-v');
      bEl.textContent = (latest.bias||'—').toUpperCase();
      bEl.style.color = latest.bias==='bull'?'var(--green)':latest.bias==='bear'?'var(--red)':'var(--dim)';
      const score = latest.bias==='bull' ? latest.bull_score : latest.bear_score;
      document.getElementById('score-v').textContent = (score||'—') + '/5';
      document.getElementById('event-v').textContent = (latest.event_type||'').replace(/_/g,' ').toUpperCase();
      document.getElementById('live-pip').style.background = 'var(--green)';
    }

    if (latest.timestamp !== lastFeedTs) {
      lastFeedTs = latest.timestamp;
      const tweet = buildTweet(latest);
      prependFeed(tweet, getSigConfig(latest.event_type).cat);
    }
  } catch(e) {
    document.getElementById('live-pip').style.background = 'var(--red)';
  }
}

// ── POLL NEWS ─────────────────────────────────────────────────
let lastNewsTs = 0;
async function pollNews() {
  try {
    const res = await fetch('/api/intel');
    const data = await res.json();
    if (!data.items?.length) return;

    // Only show new items since last check
    const newItems = data.items.filter(item => {
      const t = new Date(item.pubDate).getTime();
      return t > lastNewsTs && item.score >= 3;
    });

    if (newItems.length) {
      lastNewsTs = Math.max(...newItems.map(i => new Date(i.pubDate).getTime()));
      // Add top 2 new items to feed
      newItems.slice(0, 2).forEach(item => {
        const tweet = buildNewsTweet(item);
        prependFeed(tweet, 'news');
      });
    }

    // Update ticker
    const tickerText = data.items.slice(0,8).map(i => `${i.source}: ${i.headline}`).join('   ·   ');
    document.getElementById('ticker-inner').textContent = tickerText;
  } catch(e) {}
}

// ── CHAT ─────────────────────────────────────────────────────
function appendMsg(role, name, text) {
  const c = document.getElementById('chat-msgs');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `<span class="msg-name">${name}</span><div class="msg-bubble">${text}</div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const msg = inp.value.trim();
  if (!msg || isWaiting) return;
  inp.value = '';
  isWaiting = true;
  document.getElementById('send-btn').disabled = true;
  appendMsg('user', 'You', msg);

  const typingEl = document.createElement('div');
  typingEl.className = 'msg santosh';
  typingEl.id = 'typing-el';
  typingEl.innerHTML = `<span class="msg-name">Santosh</span><div class="typing"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  document.getElementById('chat-msgs').appendChild(typingEl);
  document.getElementById('chat-msgs').scrollTop = 99999;

  try {
    const res = await fetch('/analyst-chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message: msg, sessionId: SESSION_ID, marketContext: marketCtx })
    });
    const data = await res.json();
    typingEl.remove();
    appendMsg('santosh', 'Santosh', data.reply || 'Something went wrong.');
  } catch(e) {
    typingEl.remove();
    appendMsg('santosh', 'Santosh', 'Lost connection.');
  }

  isWaiting = false;
  document.getElementById('send-btn').disabled = false;
  inp.focus();
}

document.getElementById('send-btn').addEventListener('click', sendMsg);
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// ── INIT ─────────────────────────────────────────────────────
document.getElementById('feed').innerHTML = `
  <div id="feed-ph" style="text-align:center;color:var(--dim);font-size:12px;font-family:var(--mono);padding:60px 20px;line-height:2.5">
    WATCHING THE MARKET<br>
    <span style="font-size:10px;color:#2d3748">Signals and news will appear here automatically</span>
  </div>`;

pollFeed();
pollNews();
setInterval(pollFeed, 3000);
setInterval(pollNews, 30000);
</script>
