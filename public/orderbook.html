<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BTC Liquidity Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#060a0f;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#app{display:grid;grid-template-rows:52px 1fr 32px;height:100vh;width:100vw}

/* TOP BAR */
#topbar{background:#0d1421;border-bottom:1px solid #1e2d42;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.tb-pair{font-size:15px;font-weight:700;color:#94a3b8;letter-spacing:.08em}
#price-now{font-size:22px;font-weight:700;min-width:100px;transition:color .1s;letter-spacing:-.5px}
#price-change{font-size:12px;font-weight:600;min-width:60px;padding:2px 8px;border-radius:4px;text-align:center}
.pc-up{background:#0e2d1a;color:#22c55e}
.pc-dn{background:#2d0e0e;color:#ef4444}
.pc-flat{background:#1a1f2e;color:#64748b}
.tb-sep{width:1px;height:28px;background:#1e2d42;flex-shrink:0}

.tb-group{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.tb-group-label{font-size:9px;color:#334155;text-transform:uppercase;letter-spacing:.08em}
.tb-group-val{font-size:12px;font-weight:600;color:#cbd5e1;white-space:nowrap}

.btn-row{display:flex;gap:3px;align-items:center}
.btn-row-label{font-size:9px;color:#334155;text-transform:uppercase;letter-spacing:.08em;margin-right:2px}
.pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:5px;border:1px solid #1e2d42;background:transparent;color:#475569;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.02em}
.pill:hover{background:#1e2d42;color:#94a3b8}
.pill.active{background:#1e3a5f;color:#60a5fa;border-color:#2563eb}

#direction-sig{font-size:11px;font-weight:700;padding:5px 14px;border-radius:6px;white-space:nowrap;flex-shrink:0;letter-spacing:.04em;transition:all .3s}
.sig-short{background:#2d0e0e;color:#f87171;border:1px solid #7f1d1d}
.sig-long{background:#0e2d1a;color:#4ade80;border:1px solid #14532d}
.sig-neutral{background:#1a1f2e;color:#64748b;border:1px solid #1e2d42}

#sound-btn{font-size:10px;font-weight:600;padding:4px 10px;border-radius:5px;border:1px solid #1e2d42;background:transparent;color:#475569;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .15s}
#sound-btn.on{color:#22c55e;border-color:#14532d;background:#0e2d1a}

#conn-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
#conn-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;transition:background .3s;flex-shrink:0;box-shadow:0 0 6px #ef444466}
#conn-dot.on{background:#22c55e;box-shadow:0 0 6px #22c55e66}
#conn-lbl{font-size:10px;color:#475569;font-weight:600}

/* MAIN */
#main{display:grid;grid-template-columns:1fr 260px;overflow:hidden}
#chart-wrap{position:relative;overflow:hidden;background:#060a0f}
canvas{display:block}

/* SIDEBAR */
#sidebar{display:flex;flex-direction:column;overflow:hidden;background:#080d16;border-left:1px solid #1e2d42}
.s-hdr{font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.1em;padding:8px 12px 6px;border-bottom:1px solid #1e2d42;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.s-hdr-count{font-size:11px;font-weight:700;color:#22c55e;background:#0e2d1a;padding:1px 7px;border-radius:4px}

/* LEVELS LIST */
#levels-wrap{flex:1;overflow-y:auto;min-height:0}
#levels-wrap::-webkit-scrollbar{width:3px}
#levels-wrap::-webkit-scrollbar-thumb{background:#1e2d42;border-radius:2px}
.lvl{display:flex;align-items:center;gap:6px;padding:5px 12px;border-left:3px solid transparent;transition:background .1s;cursor:default}
.lvl:hover{background:#0d1421}
.lvl.strong{border-left-width:3px}
.lvl.weak{border-left-width:1px;opacity:.75}
.lvl-price{font-size:12px;font-weight:700;color:#e2e8f0;min-width:62px;font-variant-numeric:tabular-nums}
.lvl-label{flex:1;font-size:10px;font-weight:600;line-height:1.2}
.lvl-dist{font-size:9px;color:#334155;min-width:30px;text-align:right;font-variant-numeric:tabular-nums}
.lvl-mid{background:#0d1e36;padding:6px 12px;font-size:12px;font-weight:700;color:#60a5fa;text-align:center;border-top:1px solid #1e3a5f;border-bottom:1px solid #1e3a5f;flex-shrink:0;letter-spacing:.02em}

/* TAPE */
#tape-wrap{flex-shrink:0;border-top:1px solid #1e2d42}
#tape-box{height:110px;overflow:hidden;padding:4px 0}
.tape-row{display:flex;align-items:center;gap:8px;padding:3px 12px;font-size:11px;font-weight:600;animation:fi .1s ease}
@keyframes fi{from{opacity:0;background:#1e2d42}to{opacity:1;background:transparent}}
.t-b{color:#4ade80;min-width:14px}.t-s{color:#f87171;min-width:14px}
.t-pr{color:#e2e8f0;min-width:58px;font-variant-numeric:tabular-nums}
.t-sz{color:#475569;flex:1;font-size:10px}
.t-big{color:#fbbf24;font-size:10px}

/* DELTA */
.delta-wrap{padding:8px 12px;border-top:1px solid #1e2d42;flex-shrink:0}
.delta-label-row{display:flex;justify-content:space-between;font-size:10px;font-weight:700;margin-bottom:5px}
.delta-track{height:10px;border-radius:5px;overflow:hidden;display:flex;background:#1a1f2e}
.d-buy{background:linear-gradient(90deg,#15803d,#22c55e);transition:width .3s}
.d-sell{background:linear-gradient(90deg,#ef4444,#dc2626);transition:width .3s}

/* ALERTS */
.alerts-wrap{flex-shrink:0;border-top:1px solid #1e2d42}
#alerts-box{max-height:96px;overflow-y:auto;padding:2px 0}
#alerts-box::-webkit-scrollbar{width:2px}
.alert-row{display:flex;gap:6px;padding:4px 12px;font-size:10px;font-weight:600;line-height:1.4;animation:fi .2s ease;border-bottom:1px solid #0d1421}
.a-ico{flex-shrink:0;font-size:12px}.a-msg{color:#94a3b8;flex:1}.a-t{color:#334155;font-size:9px;flex-shrink:0}

/* LEGEND */
#legend{background:#0d1421;border-top:1px solid #1e2d42;display:flex;align-items:center;gap:12px;padding:0 16px;overflow:hidden}
.leg{display:flex;align-items:center;gap:5px;white-space:nowrap;font-size:9px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.05em}
.leg-line{width:18px;height:2px;border-radius:1px}

/* OVERLAYS */
#entry-flash{position:absolute;inset:0;pointer-events:none;opacity:0;border:3px solid transparent;transition:opacity .4s}
#entry-flash.show{opacity:1;border-color:#ef4444;box-shadow:inset 0 0 40px #ef444418}
#signal-banner{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:#7f1d1d;border:1px solid #ef4444;color:#fca5a5;font-size:12px;font-weight:700;padding:6px 20px;border-radius:6px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:10;letter-spacing:.04em;box-shadow:0 4px 20px #ef444433}
#signal-banner.show{opacity:1}
</style>
</head>
<body>
<div id="app">

<div id="topbar">
  <span class="tb-pair">BTC / USD</span>
  <span id="price-now" style="color:#22c55e">—</span>
  <span id="price-change" class="pc-flat">—</span>
  <div class="tb-sep"></div>

  <span class="btn-row-label">TF</span>
  <div class="btn-row">
    <button class="pill" data-tf="15s">15s</button>
    <button class="pill" data-tf="30s">30s</button>
    <button class="pill" data-tf="1m">1m</button>
    <button class="pill active" data-tf="5m">5m</button>
    <button class="pill" data-tf="15m">15m</button>
  </div>

  <div class="tb-sep"></div>
  <span class="btn-row-label">Zoom</span>
  <div class="btn-row">
    <button class="pill" id="zm-out">−</button>
    <span id="zoom-val" style="font-size:12px;font-weight:700;color:#e2e8f0;padding:0 6px;min-width:28px;text-align:center">20</span>
    <button class="pill" id="zm-in">+</button>
  </div>

  <div class="tb-sep"></div>
  <div class="tb-group"><span class="tb-group-label">24h High</span><span class="tb-group-val" id="s-high">—</span></div>
  <div class="tb-group"><span class="tb-group-label">24h Low</span><span class="tb-group-val" id="s-low">—</span></div>
  <div class="tb-group"><span class="tb-group-label">Depth</span><span class="tb-group-val" id="s-depth">—</span></div>
  <div class="tb-group"><span class="tb-group-label">Trades/s</span><span class="tb-group-val" id="s-tps">—</span></div>
  <div class="tb-group"><span class="tb-group-label">Signals</span><span class="tb-group-val" id="s-sigs" style="color:#22c55e">0</span></div>

  <div class="tb-sep"></div>
  <span id="direction-sig" class="sig-neutral">NEUTRAL</span>
  <button id="sound-btn">🔇 Sound</button>
  <div id="conn-wrap"><div id="conn-dot"></div><span id="conn-lbl">connecting…</span></div>
</div>

<div id="main">
  <div id="chart-wrap">
    <canvas id="c"></canvas>
    <div id="entry-flash"></div>
    <div id="signal-banner"></div>
  </div>

  <div id="sidebar">
    <div class="s-hdr">Liquidity Levels <span class="s-hdr-count" id="lvl-count">0</span></div>
    <div id="levels-wrap"><div id="levels-list"></div></div>

    <div class="tape-wrap">
      <div class="s-hdr">Live Tape <span style="font-size:9px;color:#334155;font-weight:400;text-transform:none;letter-spacing:0">executed trades</span></div>
      <div id="tape-box"></div>
    </div>

    <div class="delta-wrap">
      <div class="delta-label-row">
        <span style="color:#4ade80" id="d-b-lbl">Buy 50%</span>
        <span style="color:#94a3b8;font-size:9px;font-weight:400">30s delta</span>
        <span style="color:#f87171" id="d-s-lbl">Sell 50%</span>
      </div>
      <div class="delta-track">
        <div class="d-buy" id="d-buy" style="width:50%"></div>
        <div class="d-sell" id="d-sell" style="width:50%"></div>
      </div>
    </div>

    <div class="alerts-wrap">
      <div class="s-hdr">Alerts</div>
      <div id="alerts-box"></div>
    </div>
  </div>
</div>

<div id="legend">
  <div class="leg"><div class="leg-line" style="background:#ef4444"></div>Sell stops / Ask wall</div>
  <div class="leg"><div class="leg-line" style="background:#22c55e"></div>Buy stops / Bid wall</div>
  <div class="leg"><div class="leg-line" style="background:#eab308"></div>Round number</div>
  <div class="leg"><div class="leg-line" style="background:#a855f7"></div>Take profit</div>
  <div class="leg"><div class="leg-line" style="background:#f97316"></div>Equal highs/lows</div>
  <div class="leg"><div class="leg-line" style="background:#3b82f6"></div>Live price</div>
  <div class="leg" style="margin-left:auto"><div style="width:10px;height:10px;background:#ef4444;border-radius:50%;margin-right:4px"></div>Short signal</div>
  <span style="color:#334155;font-size:9px;margin-left:10px" id="last-tick"></span>
</div>

</div>
<script>
const BASE = window.location.origin;
const $ = id => document.getElementById(id);
const fmt  = n => '$' + Math.round(n).toLocaleString('en-GB');
const fmtS = n => n >= 1000 ? '$'+(n/1000).toFixed(1)+'k' : '$'+Math.round(n);

// ── ZOOM ──────────────────────────────────────────────────────────────────────
let ZOOM = 20;
$('zm-in').addEventListener('click',  () => { ZOOM = Math.min(70, ZOOM + (ZOOM < 20 ? 2 : 5)); $('zoom-val').textContent = ZOOM; });
$('zm-out').addEventListener('click', () => { ZOOM = Math.max(8,  ZOOM - (ZOOM <= 20 ? 2 : 5)); $('zoom-val').textContent = ZOOM; });

// ── TIMEFRAME ────────────────────────────────────────────────────────────────
const TF = {
  '15s':{ interval:'1m',  ms:15000,  poll:10000 },
  '30s':{ interval:'1m',  ms:30000,  poll:10000 },
  '1m': { interval:'1m',  ms:60000,  poll:15000 },
  '5m': { interval:'5m',  ms:300000, poll:20000 },
  '15m':{ interval:'15m', ms:900000, poll:30000 },
};
let curTF = '5m', klTimer = null;
document.querySelectorAll('[data-tf]').forEach(b => {
  b.addEventListener('click', () => {
    curTF = b.dataset.tf;
    document.querySelectorAll('[data-tf]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    ST.candles = [];
    if (klTimer) clearInterval(klTimer);
    pollKlines();
    klTimer = setInterval(pollKlines, TF[curTF].poll);
  });
});

// ── SOUND ────────────────────────────────────────────────────────────────────
let soundOn = false, audioCtx = null;
const getAudio = () => { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; };
function tone(freq, type, dur, vol) {
  try {
    const ctx=getAudio(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
    o.start(); o.stop(ctx.currentTime+dur);
  } catch(e){}
}
function snd(type) {
  if (!soundOn) return;
  if (type==='wallPull')   { tone(880,'sawtooth',.3,.2); setTimeout(()=>tone(660,'sawtooth',.2,.15),150); }
  if (type==='shortEntry') { tone(440,'sine',.15,.2); setTimeout(()=>tone(550,'sine',.15,.2),100); setTimeout(()=>tone(660,'sine',.25,.25),200); }
  if (type==='proximity')  { tone(660,'sine',.2,.1); }
}
$('sound-btn').addEventListener('click', () => {
  soundOn = !soundOn;
  $('sound-btn').textContent = soundOn ? '🔊 Sound' : '🔇 Sound';
  $('sound-btn').className = soundOn ? 'on' : '';
  if (soundOn) try { getAudio().resume(); } catch(e){}
});

// ── STATE ────────────────────────────────────────────────────────────────────
const ST = {
  price:0, prev:0, high24:0, low24:0,
  bids:new Map(), asks:new Map(),
  pbids:new Map(), pasks:new Map(),
  trades:[], tape:[],
  raw:[], candles:[],
  levels:[],
  tps:0, bookReady:false, connected:false,
};
const arrows = [];

// ── RESAMPLE ─────────────────────────────────────────────────────────────────
function resample() {
  if (!ST.raw.length) return;
  if (curTF==='1m'||curTF==='5m'||curTF==='15m') { ST.candles=ST.raw.slice(-80); return; }
  const ms=TF[curTF].ms, synth=[];
  ST.raw.slice(-40).forEach(c => {
    const n=Math.round(60000/ms), step=(c.c-c.o)/n, rng=c.h-c.l;
    for (let i=0;i<n;i++) {
      const o=c.o+step*i, cl=c.o+step*(i+1);
      synth.push({t:c.t+ms*i, o, c:cl,
        h:Math.min(Math.max(o,cl)+rng*.3*Math.random(),c.h),
        l:Math.max(Math.min(o,cl)-rng*.3*Math.random(),c.l)});
    }
  });
  if (synth.length&&ST.price) synth[synth.length-1].c=ST.price;
  ST.candles=synth.slice(-80);
}

// ── POLLING ──────────────────────────────────────────────────────────────────
async function pollBook() {
  try {
    const r=await fetch(`${BASE}/api/ob/book`); if(!r.ok) throw 0;
    const d=await r.json();
    ST.pbids=new Map(ST.bids); ST.pasks=new Map(ST.asks);
    ST.bids.clear(); ST.asks.clear();
    (d.bids||[]).forEach(([p,q])=>ST.bids.set(+p,+q));
    (d.asks||[]).forEach(([p,q])=>ST.asks.set(+p,+q));
    ST.bookReady=true;
    if (!ST.connected){ST.connected=true;setConn(true);}
  } catch(e){setConn(false);}
}
async function pollTrades() {
  try {
    const r=await fetch(`${BASE}/api/ob/trades`); if(!r.ok) return;
    const d=await r.json(); if(!d.trades?.length) return;
    ST.prev=ST.price||+d.trades[0].price;
    ST.price=+d.trades[0].price;
    d.trades.forEach(t=>{
      const tr={price:+t.price,qty:+t.qty,isSell:t.isBuyerMaker,t:Date.now()};
      ST.tape.unshift(tr); ST.trades.push(tr); ST.tps++;
    });
    if(ST.tape.length>40) ST.tape=ST.tape.slice(0,40);
    ST.trades=ST.trades.filter(t=>t.t>Date.now()-30000);
    if(ST.candles.length) ST.candles[ST.candles.length-1].c=ST.price;
    renderTape(); updateTopBar();
    ST.high24=+d.high; ST.low24=+d.low;
    $('s-high').textContent=fmt(ST.high24);
    $('s-low').textContent=fmt(ST.low24);
  } catch(e){}
}
async function pollKlines() {
  try {
    const iv=TF[curTF].interval;
    const r=await fetch(`${BASE}/api/ob/klines?interval=${iv}`); if(!r.ok) return;
    const d=await r.json(); if(!d.candles?.length) return;
    ST.raw=d.candles.map(k=>({t:+k[0],o:+k[1],h:+k[2],l:+k[3],c:+k[4]}));
    resample();
  } catch(e){}
}
function setConn(on) {
  $('conn-dot').className=on?'on':'';
  $('conn-lbl').textContent=on?'Live':'Reconnecting…';
}
setInterval(()=>{$('s-tps').textContent=ST.tps;ST.tps=0;},1000);

// ── TOP BAR ──────────────────────────────────────────────────────────────────
function updateTopBar() {
  const p=ST.price,pp=ST.prev;
  const el=$('price-now');
  el.textContent=fmt(p);
  el.style.color=p>pp?'#22c55e':p<pp?'#ef4444':'#94a3b8';
  const chg=pp?(p-pp)/pp*100:0;
  const cel=$('price-change');
  cel.textContent=(chg>=0?'+':'')+chg.toFixed(3)+'%';
  cel.className=chg>0?'pc-up':chg<0?'pc-dn':'pc-flat';
  $('last-tick').textContent=new Date().toLocaleTimeString('en-GB');
}

// ── TAPE ─────────────────────────────────────────────────────────────────────
function renderTape() {
  const el=$('tape-box'),frag=document.createDocumentFragment();
  ST.tape.slice(0,9).forEach(t=>{
    const big=t.qty>=0.5,row=document.createElement('div');
    row.className='tape-row';
    row.innerHTML=`<span class="${t.isSell?'t-s':'t-b'}">${t.isSell?'S':'B'}</span><span class="t-pr">${fmt(t.price)}</span><span class="${big?'t-big':'t-sz'}">${t.qty.toFixed(3)}${big?' ⚡':''}</span>`;
    frag.appendChild(row);
  });
  el.innerHTML=''; el.appendChild(frag);
}

// ── DELTA ────────────────────────────────────────────────────────────────────
function updateDelta() {
  let bv=0,sv=0;
  ST.trades.forEach(t=>t.isSell?sv+=t.qty:bv+=t.qty);
  const tot=bv+sv||1,bp=Math.round(bv/tot*100),sp=100-bp;
  $('d-buy').style.width=bp+'%'; $('d-sell').style.width=sp+'%';
  $('d-b-lbl').textContent='Buy '+bp+'%';
  $('d-s-lbl').textContent='Sell '+sp+'%';
  let bT=0,aT=0;
  ST.bids.forEach(q=>bT+=q); ST.asks.forEach(q=>aT+=q);
  const bookBias=bT/(aT||1);
  const sig=$('direction-sig');
  if      (sp>=63&&bookBias<0.8)  {sig.textContent='▼ SHORT BIAS';    sig.className='sig-short';}
  else if (bp>=63&&bookBias>1.25) {sig.textContent='▲ LONG BIAS';     sig.className='sig-long';}
  else if (sp>=55)                 {sig.textContent='▼ SELL PRESSURE'; sig.className='sig-short';}
  else if (bp>=55)                 {sig.textContent='▲ BUY PRESSURE';  sig.className='sig-long';}
  else                             {sig.textContent='NEUTRAL';          sig.className='sig-neutral';}
  $('s-depth').textContent=bT.toFixed(0)+'/'+aT.toFixed(0);
  return {sp,bp,bookBias};
}

// ── LEVELS — expanded range + more zones ─────────────────────────────────────
function computeLevels() {
  if (!ST.price||!ST.bookReady) return;
  const p=ST.price, levels=[];
  const RANGE=4000; // wider range — show more levels

  // 1. Round numbers — every $500 in range
  const base=Math.round(p/500)*500;
  for (let i=-8;i<=8;i++) {
    const lvl=base+i*500;
    if (Math.abs(lvl-p)<20||Math.abs(lvl-p)>RANGE) continue;
    const isK=lvl%1000===0;
    levels.push({
      price:lvl, type:'round',
      label: isK ? `ROUND ${fmt(lvl)}` : `ROUND ${fmt(lvl)}`,
      color: isK ? '#eab308' : '#a16207',
      strength: isK ? 3 : 2,
      dash: isK ? [8,3] : [5,4],
      side: lvl>p?'above':'below'
    });
  }

  // 2. Equal highs/lows from candles
  if (ST.candles.length>=6) {
    const sl=ST.candles.slice(-60), highs=[], lows=[];
    for (let i=1;i<sl.length-1;i++) {
      if (sl[i].h>sl[i-1].h&&sl[i].h>sl[i+1].h) highs.push(sl[i].h);
      if (sl[i].l<sl[i-1].l&&sl[i].l<sl[i+1].l) lows.push(sl[i].l);
    }
    const cluster=(arr,side,label,color)=>{
      const used=new Set();
      arr.forEach((v,i)=>{
        if(used.has(i))return;
        const grp=[v];
        arr.forEach((w,j)=>{if(j!==i&&!used.has(j)&&Math.abs(v-w)<80){grp.push(w);used.add(j);}});
        if(grp.length>=2){
          const avg=grp.reduce((a,b)=>a+b,0)/grp.length;
          if(Math.abs(avg-p)<RANGE&&((side==='above'&&avg>p)||(side==='below'&&avg<p)))
            levels.push({price:avg,type:'equal',label,color,strength:3,dash:[6,3],side});
        }
      });
    };
    cluster(highs,'above','EQUAL HIGHS — STOP HUNT','#f97316');
    cluster(lows, 'below','EQUAL LOWS — STOP HUNT', '#f97316');
  }

  // 3. Order book walls
  const bArr=Array.from(ST.bids.entries()).sort((a,b)=>b[0]-a[0]);
  const aArr=Array.from(ST.asks.entries()).sort((a,b)=>a[0]-b[0]);
  const avgB=bArr.reduce((s,[,q])=>s+q,0)/(bArr.length||1);
  const avgA=aArr.reduce((s,[,q])=>s+q,0)/(aArr.length||1);
  bArr.forEach(([pr,qty])=>{
    if(Math.abs(pr-p)>RANGE)return;
    if(qty>=2&&qty>avgB*2.0) levels.push({price:pr,type:'bidwall',label:`BID WALL  ${qty.toFixed(1)} BTC`,color:'#22c55e',strength:qty>avgB*4?3:2,dash:[4,4],side:'below'});
  });
  aArr.forEach(([pr,qty])=>{
    if(Math.abs(pr-p)>RANGE)return;
    if(qty>=2&&qty>avgA*2.0) levels.push({price:pr,type:'askwall',label:`ASK WALL  ${qty.toFixed(1)} BTC`,color:'#ef4444',strength:qty>avgA*4?3:2,dash:[4,4],side:'above'});
  });

  // 4. Stop clusters just beyond strong levels
  levels.filter(l=>l.strength===3).forEach(l=>{
    const stopOff=l.side==='above'?100:-100;
    const tpOff  =l.side==='above'?280:-280;
    if(Math.abs(l.price+stopOff-p)<RANGE)
      levels.push({price:l.price+stopOff,type:'stop',
        label:l.side==='above'?'STOP CLUSTER — LONGS':'STOP CLUSTER — SHORTS',
        color:l.side==='above'?'#ef4444':'#22c55e',strength:2,dash:[6,3],side:l.side});
    if(Math.abs(l.price+tpOff-p)<RANGE)
      levels.push({price:l.price+tpOff,type:'tp',label:'TAKE PROFIT ZONE',
        color:'#a855f7',strength:2,dash:[3,5],side:l.side});
  });

  // Sort, dedupe, store
  levels.sort((a,b)=>b.price-a.price);
  const dd=[];
  levels.forEach(l=>{if(!dd.some(d=>Math.abs(d.price-l.price)<40&&d.type===l.type))dd.push(l);});
  ST.levels=dd;
  $('s-sigs').textContent=dd.length;
}

// ── SHORT SIGNAL ──────────────────────────────────────────────────────────────
const sigCD={last:0};
function checkShort(delta) {
  if(!ST.price||!ST.levels.length)return;
  const near=ST.levels.find(l=>l.side==='above'&&l.price>ST.price&&(l.price-ST.price)<180&&l.strength>=2);
  if(!near||delta.sp<55||delta.bookBias>1.0)return;
  if(Date.now()-sigCD.last<15000)return;
  sigCD.last=Date.now();
  const bn=$('signal-banner'),fl=$('entry-flash');
  bn.textContent=`▼ SHORT ENTRY  —  ${fmt(near.price)}  ${near.label}`;
  bn.classList.add('show'); fl.classList.add('show');
  arrows.push({price:ST.price,t:Date.now()});
  snd('shortEntry');
  alert2('▼',`SHORT ENTRY — ${near.label} at ${fmt(near.price)}`,'#ef4444');
  setTimeout(()=>{bn.classList.remove('show');fl.classList.remove('show');},6000);
}

// ── ALERTS ───────────────────────────────────────────────────────────────────
const aCD=new Map();
function alert2(icon,msg,color) {
  const key=msg.slice(0,30);
  if(aCD.has(key)&&Date.now()-aCD.get(key)<8000)return;
  aCD.set(key,Date.now());
  const t=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const el=document.createElement('div');
  el.className='alert-row';
  el.innerHTML=`<span class="a-ico" style="color:${color}">${icon}</span><span class="a-msg">${msg}</span><span class="a-t">${t}</span>`;
  const box=$('alerts-box');
  box.prepend(el);
  if(box.children.length>12)box.lastChild.remove();
}
function checkWalls() {
  ST.pasks.forEach((qty,pr)=>{const n=ST.asks.get(pr)||0;if(qty>=2&&n<qty*.35){alert2('⚡',`Ask wall pulled ${fmt(pr)} — ${qty.toFixed(1)} BTC`,'#fbbf24');snd('wallPull');}});
  ST.pbids.forEach((qty,pr)=>{const n=ST.bids.get(pr)||0;if(qty>=2&&n<qty*.35){alert2('⚡',`Bid wall pulled ${fmt(pr)} — ${qty.toFixed(1)} BTC`,'#fbbf24');snd('wallPull');}});
}
function checkProx() {
  ST.levels.forEach(l=>{
    const d=Math.abs(l.price-ST.price);
    if(d<80&&d>5&&l.strength>=2){alert2('→',`Price near ${l.label} at ${fmt(l.price)}`,l.color);if(d<35)snd('proximity');}
  });
}

// ── SIDEBAR LEVELS ───────────────────────────────────────────────────────────
function renderLevels() {
  const list=$('levels-list'),p=ST.price,frag=document.createDocumentFragment();
  let mid=false;
  ST.levels.forEach(lv=>{
    if(!mid&&lv.price<p){
      mid=true;
      const m=document.createElement('div');m.className='lvl-mid';
      m.textContent='▶  '+fmt(p)+'  NOW';frag.appendChild(m);
    }
    const row=document.createElement('div');
    row.className='lvl '+(lv.strength===3?'strong':'weak');
    row.style.borderLeftColor=lv.color;
    row.innerHTML=
      `<span class="lvl-price" style="color:${lv.color}">${fmt(lv.price)}</span>`+
      `<span class="lvl-label" style="color:${lv.color}">${lv.label}</span>`+
      `<span class="lvl-dist">${fmtS(Math.abs(lv.price-p))}</span>`;
    frag.appendChild(row);
  });
  if(!mid){const m=document.createElement('div');m.className='lvl-mid';m.textContent='▶  '+fmt(p)+'  NOW';frag.appendChild(m);}
  list.innerHTML='';list.appendChild(frag);
  $('lvl-count').textContent=ST.levels.length;
}

// ── CHART ────────────────────────────────────────────────────────────────────
const cv=$('c'),cx=cv.getContext('2d');
let DPR=devicePixelRatio||1;
function resize(){
  const w=$('chart-wrap');DPR=devicePixelRatio||1;
  cv.width=w.offsetWidth*DPR;cv.height=w.offsetHeight*DPR;
  cv.style.width=w.offsetWidth+'px';cv.style.height=w.offsetHeight+'px';
}

function draw(){
  const W=cv.width/DPR,H=cv.height/DPR;
  cx.clearRect(0,0,cv.width,cv.height);
  cx.setTransform(DPR,0,0,DPR,0,0);

  if(!ST.price||ST.candles.length<3){
    cx.fillStyle='#334155';cx.font='13px -apple-system,sans-serif';cx.textAlign='center';
    cx.fillText(ST.connected?'Waiting for candle data…':'Connecting to Binance…',W/2,H/2);
    return;
  }

  const PW=74,L=8,chartW=W-PW-L,TOP=14,BOT=H-20,chartH=BOT-TOP;
  const candles=ST.candles.slice(-ZOOM);

  // Y scale from candles ONLY — keeps candles large and readable
  const prices=candles.flatMap(c=>[c.h,c.l,c.o,c.c]);
  prices.push(ST.price);
  const cMin=Math.min(...prices),cMax=Math.max(...prices);
  const cRng=cMax-cMin||20;
  const pad=cRng*0.15;
  const lo=cMin-pad,hi=cMax+pad,rng=hi-lo||1;
  const py=p=>TOP+(1-(p-lo)/rng)*chartH;

  // Grid
  const gridCount=6;
  for(let i=0;i<=gridCount;i++){
    const pv=lo+rng/gridCount*i,y=py(pv);
    cx.beginPath();cx.strokeStyle='#0f1929';cx.lineWidth=1;cx.setLineDash([]);
    cx.moveTo(L,y);cx.lineTo(L+chartW,y);cx.stroke();
    cx.fillStyle='#334155';cx.font='10px -apple-system,sans-serif';cx.textAlign='left';
    cx.fillText('$'+Math.round(pv).toLocaleString('en-GB'),L+chartW+4,y+4);
  }

  // Level lines — in view = full line, out of view = edge marker
  ST.levels.forEach(lv=>{
    const y=py(lv.price);
    const inView=y>=TOP-1&&y<=BOT+1;
    if(inView){
      cx.save();
      cx.setLineDash(lv.dash||[5,4]);cx.strokeStyle=lv.color;
      cx.lineWidth=lv.strength===3?1.8:1;
      cx.globalAlpha=lv.strength===3?0.85:0.45;
      cx.beginPath();cx.moveTo(L,y);cx.lineTo(L+chartW,y);cx.stroke();
      cx.restore();
      // Label
      cx.save();
      const sl=lv.label.length>28?lv.label.slice(0,28)+'…':lv.label;
      cx.font=(lv.strength===3?'bold ':'')+' 9px -apple-system,sans-serif';
      const tw=cx.measureText(sl).width+8;
      cx.fillStyle=lv.color+'28';cx.strokeStyle=lv.color+'80';cx.lineWidth=0.5;cx.setLineDash([]);
      cx.beginPath();
      if(cx.roundRect)cx.roundRect(L+6,y-9,tw,12,3);else cx.rect(L+6,y-9,tw,12);
      cx.fill();cx.stroke();
      cx.fillStyle=lv.color;cx.textAlign='left';
      cx.fillText(sl,L+10,y+1);
      cx.restore();
    } else if(lv.strength===3){
      // Off-screen strong level — show edge marker
      const atTop=lv.price>hi;
      const ey=atTop?TOP+4:BOT-4;
      cx.save();cx.globalAlpha=0.65;cx.fillStyle=lv.color;
      cx.font='bold 9px -apple-system,sans-serif';cx.textAlign='left';
      cx.fillText((atTop?'▲ ':'▼ ')+fmt(lv.price)+'  '+lv.label.slice(0,20),L+6,atTop?ey+10:ey-2);
      cx.restore();
    }
  });

  // Candles
  const sp=chartW/candles.length,bw=Math.max(3,sp*0.7);
  candles.forEach((c,i)=>{
    const x=L+i*sp+sp/2,bull=c.c>=c.o;
    const col=bull?'#22c55e':'#ef4444';
    const bodyCol=bull?'#15803d':'#b91c1c';
    const oY=py(c.o),cY=py(c.c),hY=py(c.h),lY=py(c.l);
    // Wick
    cx.beginPath();cx.strokeStyle=col;cx.lineWidth=1.2;cx.setLineDash([]);
    cx.moveTo(x,hY);cx.lineTo(x,lY);cx.stroke();
    // Body
    const top=Math.min(oY,cY),ht=Math.max(Math.abs(cY-oY),2);
    cx.fillStyle=bodyCol;
    cx.fillRect(x-bw/2,top,bw,ht);
    cx.strokeStyle=col;cx.lineWidth=1;
    cx.strokeRect(x-bw/2,top,bw,ht);
  });

  // Entry arrows
  const now=Date.now();
  for(let i=arrows.length-1;i>=0;i--){
    if(now-arrows[i].t>30000){arrows.splice(i,1);continue;}
    const y=py(arrows[i].price),x=L+chartW-sp*2;
    cx.save();
    cx.fillStyle='#ef4444';
    cx.beginPath();
    cx.moveTo(x,y-22);cx.lineTo(x+9,y-9);cx.lineTo(x+5,y-9);
    cx.lineTo(x+5,y+2);cx.lineTo(x-5,y+2);cx.lineTo(x-5,y-9);cx.lineTo(x-9,y-9);
    cx.closePath();cx.fill();
    cx.fillStyle='#fff';cx.font='bold 9px -apple-system,sans-serif';cx.textAlign='center';
    cx.fillText('SHORT',x,y+15);
    cx.restore();
  }

  // Live price line
  const nowY=py(ST.price);
  cx.save();cx.setLineDash([3,3]);cx.strokeStyle='#3b82f6';cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(L,nowY);cx.lineTo(L+chartW,nowY);cx.stroke();
  cx.setLineDash([]);
  const ptxt=fmt(ST.price);
  cx.font='bold 11px -apple-system,sans-serif';
  const ptw=cx.measureText(ptxt).width+14;
  cx.fillStyle='#1d4ed8';
  if(cx.roundRect)cx.roundRect(L+chartW+1,nowY-9,ptw,18,4);else cx.rect(L+chartW+1,nowY-9,ptw,18);
  cx.fill();cx.fillStyle='#fff';cx.textAlign='left';cx.fillText(ptxt,L+chartW+8,nowY+4);
  cx.restore();

  // Depth strip
  let bT=0,aT=0;ST.bids.forEach(q=>bT+=q);ST.asks.forEach(q=>aT+=q);
  const tot=bT+aT||1;
  cx.fillStyle='#15803d20';cx.fillRect(L,BOT,bT/tot*chartW,6);
  cx.fillStyle='#b91c1c20';cx.fillRect(L+bT/tot*chartW,BOT,aT/tot*chartW,6);

  // X-axis time labels
  const xStep=Math.max(1,Math.floor(candles.length/6));
  candles.forEach((c,i)=>{
    if(i%xStep!==0)return;
    const x=L+i*sp+sp/2,t=new Date(c.t);
    cx.fillStyle='#334155';cx.font='10px -apple-system,sans-serif';cx.textAlign='center';
    const short=curTF==='15s'||curTF==='30s'||curTF==='1m';
    cx.fillText(
      short
        ?t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0')+':'+t.getSeconds().toString().padStart(2,'0')
        :t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0'),
      x,H-5);
  });

  // TF + zoom label top-right of chart
  cx.fillStyle='#1e2d42';cx.font='bold 11px -apple-system,sans-serif';cx.textAlign='right';
  cx.fillText(curTF+' · '+ZOOM+' bars',L+chartW-6,TOP+13);
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function tick(){
  computeLevels();checkWalls();checkProx();
  const d=updateDelta();checkShort(d);
  renderLevels();draw();
}

window.addEventListener('resize',()=>{resize();draw();});
resize();
setInterval(pollBook,200);setInterval(pollTrades,500);
klTimer=setInterval(pollKlines,TF[curTF].poll);
pollBook();pollTrades();pollKlines();
setTimeout(pollKlines,1500);setTimeout(pollKlines,3000);
setInterval(tick,100);
</script>
